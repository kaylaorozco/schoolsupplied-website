<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Privacy Policy — School Supplied</title>
  <meta name="description" content="Privacy Policy for School Supplied." />
  <meta name="theme-color" content="#FAF6EC" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sansita:wght@700;800&family=Schibsted+Grotesk:wght@400;500;600;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --navy:    #1B2A4E;
      --yellow:  #F4C430;
      --cream:   #FAF6EC;
      --gray:    #6B6760;
      --navy-16: rgba(27, 42, 78, 0.16);

      --display: "Sansita", Georgia, serif;
      --text:    "Schibsted Grotesk", system-ui, -apple-system, sans-serif;

      --s-4: 4px; --s-8: 8px; --s-12: 12px; --s-16: 16px;
      --s-20: 20px; --s-24: 24px; --s-32: 32px; --s-48: 48px; --s-64: 64px;

      --r-sm: 4px; --r-md: 10px; --r-lg: 16px; --r-app: 27px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--cream);
      color: var(--navy);
      font-family: var(--text);
      font-weight: 400;
      font-size: 17px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a { color: var(--navy); text-decoration: underline; text-decoration-thickness: 1.5px; text-underline-offset: 3px; }
    a:hover { text-decoration-thickness: 2px; }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: var(--s-32) var(--s-24);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--s-16);
      padding-bottom: var(--s-24);
      border-bottom: 1.5px solid var(--navy);
    }
    .wordmark {
      display: inline-flex;
      align-items: center;
      gap: var(--s-12);
      text-decoration: none;
      color: var(--navy);
    }
    .wordmark .mark {
      width: 36px; height: 36px;
      border-radius: 9px;
      background: var(--yellow);
      display: grid;
      place-items: center;
      border: 1.5px solid var(--navy);
    }
    .wordmark .name {
      font-family: var(--display);
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.01em;
    }
    .wordmark .dot { color: var(--yellow); }

    .topnav {
      display: flex;
      align-items: center;
      gap: var(--s-24);
      font-size: 15px;
      font-weight: 500;
    }
    .topnav a { text-decoration: none; }
    .topnav a:hover { text-decoration: underline; text-decoration-thickness: 1.5px; text-underline-offset: 3px; }

    .privacy-content {
      padding-top: var(--s-48);
      padding-bottom: var(--s-64);
    }

    footer {
      border-top: 1.5px solid var(--navy);
      padding-top: var(--s-24);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--s-16);
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--gray);
    }
    footer a { color: var(--gray); }

    @media (max-width: 600px) {
      .topnav { gap: var(--s-16); }
      footer { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div class="page">

    <header class="topbar">
      <a href="/" class="wordmark" aria-label="School Supplied home">
        <span class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#1B2A4E" stroke-width="2" stroke-linecap="round">
            <rect x="5" y="5" width="14" height="16" rx="1.5" fill="#FAF6EC"/>
            <line x1="8" y1="3" x2="8" y2="6.5"/>
            <line x1="12" y1="3" x2="12" y2="6.5"/>
            <line x1="16" y1="3" x2="16" y2="6.5"/>
            <line x1="8" y1="11" x2="16" y2="11"/>
            <line x1="8" y1="14.5" x2="16" y2="14.5"/>
            <line x1="8" y1="18" x2="13" y2="18"/>
          </svg>
        </span>
        <span class="name">School&nbsp;Supplied<span class="dot">.</span></span>
      </a>
      <nav class="topnav" aria-label="Primary">
        <a href="mailto:support@schoolsupplied.app">Support</a>
      </nav>
    </header>

    <main class="privacy-content">
      <div name="termly-embed" data-id="af4f65f6-ab4a-4a7d-bff7-e967e3f173fb"></div>
      <script type="text/javascript">(function(d, s, id) {
        var js, tjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s); js.id = id;
        js.src = "https://app.termly.io/embed-policy.min.js";
        tjs.parentNode.insertBefore(js, tjs);
      }(document, 'script', 'termly-jssdk'));</script>
    </main>

    <footer>
      <span>&copy; 2026 School Supplied</span>
      <nav style="display:flex; gap: var(--s-16);">
        <a href="mailto:support@schoolsupplied.app">Support</a>
        <a href="mailto:privacy@schoolsupplied.app">Privacy questions</a>
        <a href="/privacy" aria-current="page">Privacy</a>
        <a href="/cookies">Cookies</a>
        <a href="/terms">Terms</a>
      </nav>
    </footer>

  </div>

</body>
</html>
