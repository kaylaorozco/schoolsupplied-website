<svg viewBox="0 0 1128 191" width="1128" height="191" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sansita:wght@700;800&amp;family=Schibsted+Grotesk:wght@400;500;600;800&amp;display=swap');
    </style>
  </defs>

  <!-- Cream background -->
  <rect width="1128" height="191" fill="#FAF6EC"/>

  <!-- Top + bottom editorial border lines -->
  <line x1="0" y1="0" x2="1128" y2="0" stroke="#1B2A4E" stroke-width="3"/>
  <line x1="0" y1="191" x2="1128" y2="191" stroke="#1B2A4E" stroke-width="3"/>

  <!-- ============ LEFT: Notepad spine ============ -->
  <!-- Yellow spiral binding strip -->
  <rect x="0" y="0" width="72" height="191" fill="#F4C430"/>
  <!-- Vertical divider line -->
  <line x1="72" y1="0" x2="72" y2="191" stroke="#1B2A4E" stroke-width="2"/>
  <!-- Spiral teeth (top tabs) -->
  <rect x="24" y="0" width="24" height="12" rx="3" fill="#FAF6EC" stroke="#1B2A4E" stroke-width="1.5"/>
  <rect x="24" y="179" width="24" height="12" rx="3" fill="#FAF6EC" stroke="#1B2A4E" stroke-width="1.5"/>
  <!-- Spiral binding rings -->
  <circle cx="36" cy="35" r="11" fill="#FAF6EC" stroke="#1B2A4E" stroke-width="2"/>
  <circle cx="36" cy="66" r="11" fill="#FAF6EC" stroke="#1B2A4E" stroke-width="2"/>
  <circle cx="36" cy="97" r="11" fill="#FAF6EC" stroke="#1B2A4E" stroke-width="2"/>
  <circle cx="36" cy="128" r="11" fill="#FAF6EC" stroke="#1B2A4E" stroke-width="2"/>
  <circle cx="36" cy="159" r="11" fill="#FAF6EC" stroke="#1B2A4E" stroke-width="2"/>

  <!-- ============ PAPER AREA: ruled lines ============ -->
  <!-- Red margin line -->
  <line x1="118" y1="24" x2="118" y2="167" stroke="#C8362D" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Ruled lines (subtle) — stop at the vertical divider -->
  <line x1="90" y1="65"  x2="700" y2="65"  stroke="#1B2A4E" stroke-width="1" opacity="0.12"/>
  <line x1="90" y1="95"  x2="700" y2="95"  stroke="#1B2A4E" stroke-width="1" opacity="0.12"/>
  <line x1="90" y1="125" x2="700" y2="125" stroke="#1B2A4E" stroke-width="1" opacity="0.12"/>

  <!-- ============ HEADLINE ============ -->
  <text
    x="260" y="114"
    font-family="Sansita, Georgia, serif"
    font-weight="800"
    font-size="52"
    fill="#1B2A4E"
    letter-spacing="-1.5"
  >School Supplied<tspan fill="#C8362D">.</tspan></text>

  <!-- ============ DIVIDER ============ -->
  <line x1="700" y1="32" x2="700" y2="159" stroke="#1B2A4E" stroke-width="1.5" opacity="0.25"/>

  <!-- ============ RIGHT: Tagline + badge ============ -->
  <!-- Eyebrow label -->
  <text
    x="770" y="42"
    font-family="Schibsted Grotesk, system-ui, sans-serif"
    font-size="10.5"
    font-weight="600"
    fill="#6B6760"
    letter-spacing="2.5"
  >AN IPHONE APP FOR PARENTS</text>

  <!-- Tagline lines -->
  <text
    x="770" y="78"
    font-family="Schibsted Grotesk, system-ui, sans-serif"
    font-size="19"
    font-weight="500"
    fill="#1B2A4E"
  >Every kid&#8217;s list.</text>

  <text
    x="770" y="104"
    font-family="Schibsted Grotesk, system-ui, sans-serif"
    font-size="19"
    font-weight="500"
    fill="#1B2A4E"
  >One shopping trip.</text>

  <!-- URL badge — navy pill -->
  <rect x="770" y="122" width="194" height="34" rx="8" fill="#1B2A4E"/>
  <text
    x="867" y="145"
    text-anchor="middle"
    font-family="Sansita, Georgia, serif"
    font-size="15"
    font-weight="700"
    fill="#FAF6EC"
    letter-spacing="0.4"
  >schoolsupplied.app</text>


</svg>
